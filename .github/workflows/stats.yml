name: Generate Stats

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch top-langs card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs?username=Yumei1010&layout=compact&hide_border=true&langs_count=8" -o top-langs.svg
      - name: Commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update top-langs stats"
          git push
